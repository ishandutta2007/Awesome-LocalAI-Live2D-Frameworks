<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  <circle cx="1100" cy="400" r="300" fill="#0f3460" opacity="0.5" />
  <circle cx="100" cy="0" r="200" fill="#e94560" opacity="0.2" />
  
  <text x="50%" y="45%" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="70" font-weight="800" fill="#fff" text-anchor="middle" filter="url(#glow)">
    🤖 Awesome Local AI + Live2D ✨
  </text>
  <text x="50%" y="62%" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="300" fill="#a2a8d3" text-anchor="middle">
    The Ultimate Curated List of Privacy-First Virtual Companions
  </text>
  
  <rect x="540" y="300" width="200" height="4" rx="2" fill="#e94560" />
</svg>
